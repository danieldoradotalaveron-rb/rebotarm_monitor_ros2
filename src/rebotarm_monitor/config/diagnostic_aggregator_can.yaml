# Aggregator config used when enable_can_monitor:=true.
# Adds the Bus group on top of the default analyzers.
/**:
  ros__parameters:
    pub_rate: 1.0
    path: RebotArm
    hardware:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Hardware
      startswith: ["rebotarm/hardware"]
    joints:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Joints
      startswith: ["rebotarm/joints/"]
    gripper:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Gripper
      startswith: ["rebotarm/gripper"]
    link:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Link
      startswith: ["rebotarm/link/"]
    bus:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Bus
      startswith: ["rebotarm/bus/"]
    system:
      type: diagnostic_aggregator/GenericAnalyzer
      path: System
      startswith: ["rebotarm/system/"]
